apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-core
  namespace: zenith
  labels:
    app: zenith-core
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zenith-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: zenith-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      initContainers:
        - name: run-migrations
          image: your-registry/zenith-core:latest
          command: ["pnpm", "run", "migration:run"]
          envFrom:
            - configMapRef:
                name: zenith-config
            - secretRef:
                name: zenith-secrets
      containers:
        - name: zenith-core
          image: your-registry/zenith-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: zenith-config
            - secretRef:
                name: zenith-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
