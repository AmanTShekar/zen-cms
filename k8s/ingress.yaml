apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zenith-ingress
  namespace: zenith
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - zenith.example.com
      secretName: zenith-tls
  rules:
    - host: zenith.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: zenith-core
                port:
                  number: 80
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: zenith-core
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zenith-admin
                port:
                  number: 80
