name: Production Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=high

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit Tests
        run: pnpm test

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/core/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/core:latest,ghcr.io/${{ env.REPO_LC }}/core:${{ github.sha }}

      - name: Build and Push Admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/admin/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/admin:latest,ghcr.io/${{ env.REPO_LC }}/admin:${{ github.sha }}

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scanner on Core
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'ghcr.io/${{ env.REPO_LC }}/core:${{ github.sha }}'
          version: 'v0.72.0'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on Admin
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'ghcr.io/${{ env.REPO_LC }}/admin:${{ github.sha }}'
          version: 'v0.72.0'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
