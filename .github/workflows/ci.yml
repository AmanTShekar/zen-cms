name: Zenith CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Dependency Security Audit
        run: pnpm audit --audit-level=high || echo "⚠️ Warning: High severity vulnerabilities found. Run pnpm audit to review."

      - name: Secret Leak & SAST Check
        run: |
          echo "🔎 Scanning codebase for potential secrets and syntax patterns..."
          # Simple check for AWS keys, private keys, or typical credentials in committed code
          if grep -qE "AWS_SECRET_ACCESS_KEY|SECRET_KEY|PASSWORD|PRIVATE KEY" $(git ls-files | grep -vE "\.env|seed\.ts|AGENTS.md|walkthrough.md|production_readiness"); then
            echo "❌ Error: Potential secret keys or password strings detected in source files!"
            exit 1
          fi
          echo "✅ Secret leak scan passed."

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
