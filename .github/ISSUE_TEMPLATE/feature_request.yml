name: '✨ Feature Request'
description: 'Propose a new feature, widget, or enhancement to the core CMS framework'
title: '[FEAT] '
labels: ['enhancement', 'proposal']
body:
  - type: textarea
    id: problem
    attributes:
      label: 'Is your feature request related to a problem?'
      description: 'A clear and concise description of what the problem is.'
      placeholder: "e.g., I'm always frustrated when I cannot filter audit logs by specific site workspaces."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: 'A clear and concise description of what you want to happen.'
      placeholder: 'Add a site picker dropdown inside the AuditLog page with local storage sync.'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
      placeholder: 'e.g., Filtering by query parameters instead.'
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: 'Additional Context'
      description: 'Add any other context, mockup screenshots, or design tokens here.'
    validations:
      required: false
