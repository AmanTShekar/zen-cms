name: '🐛 Bug Report'
description: 'Report a bug or unexpected behavior in Zenith CMS'
title: '[BUG] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: 'Description of the Bug'
      description: 'A clear and concise description of what the bug is.'
      placeholder: 'e.g., When editing a product relationship field, the active user presence crashes the editor.'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 'Steps to Reproduce'
      description: 'Step-by-step instructions on how to reproduce the behavior.'
      placeholder: |
        1. Go to the Admin dashboard at localhost:5173
        2. Navigate to 'Site Workspaces'
        3. Edit the 'Products' collection
        4. Focus on the category relationship picker
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: 'Environment Information'
      description: 'Which OS/Browser are you running Zenith on?'
      options:
        - Windows
        - macOS
        - Linux
        - Other (Specify in description)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: 'Node.js Version'
      placeholder: 'e.g., v20.11.0'
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: 'Browser & Version'
      placeholder: 'e.g., Chrome v120'
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 'System Console & Server logs'
      description: 'Paste any relevant error logs from the terminal or browser inspector console.'
      render: shell
      placeholder: 'e.g., RelationPicker.tsx:64 Uncaught ReferenceError...'
    validations:
      required: false
